<svg xmlns="http://www.w3.org/2000/svg" width="600" height="144" viewBox="0 0 600 144">
  <style>
    .background {
      fill: #1e1e2e;
      stroke: #313244;
      stroke-width: 1;
      rx: 8px;
    }
    .accent-bar {
      fill: #cba6f7;
      rx: 2px;
    }
    .quote-text {
      fill: #86e2d5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-style: italic;
    }
    .author-text {
      fill: #89b4fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: bold;
    }
  </style>
  <rect width="600" height="144" class="background"/>
  <rect x="12" y="16" width="4" height="112" class="accent-bar"/>
  <g>
    <text x="45" y="48" class="quote-text"><tspan fill="#cba6f7" font-family="Georgia, serif" font-size="20px" font-weight="bold">“</tspan>How you think when you lose determines how long it will be</text>
  <text x="45" y="72" class="quote-text">until you win.<tspan fill="#cba6f7" font-family="Georgia, serif" font-size="20px" font-weight="bold">”</tspan></text>
  </g>
  <text x="560" y="108" text-anchor="end" class="author-text">- Gilbert Chesterton</text>
</svg>